app = 'agentive-redis'
primary_region = 'bom'

[build]
  image = 'redis:7-alpine'

[[mounts]]
  source = 'redis_data'
  destination = '/data'

[[services]]
  internal_port = 6379
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 6379

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
