version: "3.8"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: agentive
      POSTGRES_USER: agentive
      POSTGRES_PASSWORD: agentive_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  pgdata: