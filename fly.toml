# fly.toml — Fly.io deployment config for Agentive Engine
app = 'agentive-engine'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '3001'
  NODE_ENV = 'production'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health/ready"
    protocol = "http"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
